version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: maxxplayer-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=maxxplayer
      - CORS_ORIGINS=*
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maxxplayer-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  mongo:
    image: mongo:latest
    container_name: maxxplayer-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - maxx_db:/data/db

  nginx:
    image: nginx:alpine
    container_name: maxxplayer-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  maxx_db:
