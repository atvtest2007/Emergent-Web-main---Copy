name: Build Desktop Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release:
        description: "Publish to GitHub Release (yes/no)"
        required: false
        default: "no"

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  # ----------- Build matrix: Windows, macOS, Linux -----------
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            dist_cmd: yarn dist:win
            artifact_glob: |
              desktop/dist/*.exe
          - os: macos-latest
            label: macos
            dist_cmd: yarn dist:mac
            artifact_glob: |
              desktop/dist/*.dmg
              desktop/dist/*.zip
          - os: ubuntu-latest
            label: linux
            dist_cmd: yarn dist:linux
            artifact_glob: |
              desktop/dist/*.AppImage
              desktop/dist/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: |
            frontend/yarn.lock
            desktop/yarn.lock

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fakeroot dpkg rpm libarchive-tools \
            libnss3 libatk-bridge2.0-0 libgtk-3-0 \
            libxss1 libasound2 libgbm1

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Install desktop deps
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"
          GENERATE_SOURCEMAP: "false"
        run: |
          # Use cross-platform npm script for web build on Windows
          cd ../frontend && yarn build
          cd ../desktop && rm -rf web && cp -r ../frontend/build ./web
          npx electron-builder --win --x64 --publish=never

      - name: Build (macOS / Linux)
        if: matrix.os != 'windows-latest'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"
          GENERATE_SOURCEMAP: "false"
        run: ${{ matrix.dist_cmd }} -- --publish=never

      - name: List artifacts
        if: always()
        shell: bash
        run: |
          echo "::group::desktop/dist contents"
          ls -lh desktop/dist || true
          echo "::endgroup::"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maxx-player-${{ matrix.label }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: warn
          retention-days: 14

  # ----------- Publish all platform artifacts to one GitHub Release -----------
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist-all -type f \
            \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" \
               -o -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} release-assets/ \;
          ls -lh release-assets

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Maxx Player ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
