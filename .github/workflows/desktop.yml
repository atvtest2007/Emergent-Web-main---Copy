name: Build Desktop Apps (Electron)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Desktop Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install Dependencies
        working-directory: frontend
        run: yarn install

      - name: Build Electron App
        working-directory: frontend
        run: yarn electron:build
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL || 'https://your-cloud-backend.com' }}

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: MaxxPlayer-Windows
          path: frontend/dist/*.exe

      - name: Upload Mac Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: MaxxPlayer-Mac
          path: frontend/dist/*.dmg

      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: MaxxPlayer-Linux
          path: frontend/dist/*.AppImage
