user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream backend_api {
        server backend:8000;
    }

    server {
        listen 80;
        server_name app.maxxplayer.com api.maxxplayer.com;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API Subdomain
    server {
        listen 443 ssl http2;
        server_name api.maxxplayer.com;

        # SSL Configuration (assuming certificates generated)
        # ssl_certificate /etc/letsencrypt/live/api.maxxplayer.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/api.maxxplayer.com/privkey.pem;

        # Rate limiting on API
        limit_req zone=api_limit burst=20 nodelay;

        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers are handled by FastAPI, but can be added here if needed
        }
    }

    # Frontend Application
    server {
        listen 443 ssl http2;
        server_name app.maxxplayer.com;

        # SSL Configuration
        # ssl_certificate /etc/letsencrypt/live/app.maxxplayer.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/app.maxxplayer.com/privkey.pem;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000";
        }
    }
}
